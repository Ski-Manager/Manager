# .github/workflows/dump-all-secrets.yml
name: Dump all secrets as hex
on:
  workflow_dispatch:   # run manually from Actions tab

jobs:
  dump-all-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Dump secrets
        run: |
          echo "ADMIN_PASSWORD=$(echo -n "${{ secrets.ADMIN_PASSWORD }}" | xxd -ps)"
          echo "CI_ENCRYPTION_KEY=$(echo -n "${{ secrets.CI_ENCRYPTION_KEY }}" | xxd -ps)"
          echo "CRON_PASSWORD=$(echo -n "${{ secrets.CRON_PASSWORD }}" | xxd -ps)"
          echo "CRON_SECRET_KEY=$(echo -n "${{ secrets.CRON_SECRET_KEY }}" | xxd -ps)"
          echo "DB_NAME=$(echo -n "${{ secrets.DB_NAME }}" | xxd -ps)"
          echo "DB_PASS=$(echo -n "${{ secrets.DB_PASS }}" | xxd -ps)"
          echo "DB_USER=$(echo -n "${{ secrets.DB_USER }}" | xxd -ps)"
          echo "GOOGLE_CLIENT_ID=$(echo -n "${{ secrets.GOOGLE_CLIENT_ID }}" | xxd -ps)"
          echo "HCAPTCHA_SECRET=$(echo -n "${{ secrets.HCAPTCHA_SECRET }}" | xxd -ps)"
          echo "HCAPTCHA_SITEKEY=$(echo -n "${{ secrets.HCAPTCHA_SITEKEY }}" | xxd -ps)"
          echo "HOME_UPLOAD_TOKEN=$(echo -n "${{ secrets.HOME_UPLOAD_TOKEN }}" | xxd -ps)"
          echo "IMPERSONATE_PASSWORD=$(echo -n "${{ secrets.IMPERSONATE_PASSWORD }}" | xxd -ps)"
          echo "IMPERSONATE_PASSWORD_HASH=$(echo -n "${{ secrets.IMPERSONATE_PASSWORD_HASH }}" | xxd -ps)"
          echo "SKI_QUIZ_SECRET_CODE=$(echo -n "${{ secrets.SKI_QUIZ_SECRET_CODE }}" | xxd -ps)"
          echo "SONAR_HOST_URL=$(echo -n "${{ secrets.SONAR_HOST_URL }}" | xxd -ps)"
          echo "SONAR_PROJECT_KEY=$(echo -n "${{ secrets.SONAR_PROJECT_KEY }}" | xxd -ps)"
          echo "SONAR_TOKEN=$(echo -n "${{ secrets.SONAR_TOKEN }}" | xxd -ps)"
          echo "VPS_HOST=$(echo -n "${{ secrets.VPS_HOST }}" | xxd -ps)"
          echo "VPS_SSH_KEY=$(echo -n "${{ secrets.VPS_SSH_KEY }}" | xxd -ps)"
          echo "VPS_USER=$(echo -n "${{ secrets.VPS_USER }}" | xxd -ps)"
