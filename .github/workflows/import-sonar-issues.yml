name: Import SonarQube Issues

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch SonarQube Issues
        run: |
          curl -u "${{ secrets.SONAR_TOKEN }}:" \
          "${{ secrets.SONAR_HOST_URL }}/api/issues/search?projects=${{ secrets.SONAR_PROJECT_KEY }}&resolved=false&pageSize=500" \
          -o sonar-issues.json

      - name: Create GitHub Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const data = JSON.parse(
              fs.readFileSync('sonar-issues.json', 'utf8')
            );

            const existingIssues =
              await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                per_page: 100
              });

            for (const issue of data.issues) {
              const title = `[SonarQube] ${issue.message}`;

              const exists = existingIssues.data.some(
                i => i.title === title
              );

              if (exists) {
                console.log(`Skipping existing issue: ${title}`);
                continue;
              }

              const body = `
Severity: ${issue.severity}

Type: ${issue.type}

Rule: ${issue.rule}

File: ${issue.component}

Line: ${issue.line || 'N/A'}

Created: ${issue.creationDate}

Imported from SonarQube before account deletion.
              `;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sonarqube-import']
              });

              console.log(`Created issue: ${title}`);
            }
