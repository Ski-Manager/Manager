name: Import SonarQube Issues

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch SonarQube Issues
        run: |
          curl -u "${{ secrets.SONAR_TOKEN }}:" \
          "https://sonarcloud.io/api/issues/search?projects=${{ secrets.SONAR_PROJECT_KEY }}&statuses=OPEN,CONFIRMED,REOPENED,RESOLVED,CLOSED&pageSize=500" \
          -o sonar-issues.json

          echo "===== SONAR RESPONSE ====="
          cat sonar-issues.json

      - name: Create GitHub Issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const raw = fs.readFileSync('sonar-issues.json', 'utf8');

            console.log(raw);

            const data = JSON.parse(raw);

            if (!data.issues) {
              core.setFailed('SonarCloud API returned no issues field');
              return;
            }

            console.log(`Found ${data.issues.length} issues`);

            for (const issue of data.issues) {
              const title = `[SonarQube] ${issue.message}`;

              const body =
                `Severity: ${issue.severity}\n\n` +
                `Type: ${issue.type}\n\n` +
                `Rule: ${issue.rule}\n\n` +
                `File: ${issue.component}\n\n` +
                `Line: ${issue.line || 'N/A'}\n\n` +
                `Created: ${issue.creationDate}`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sonarqube-import']
              });

              console.log(`Created: ${title}`);
            }
